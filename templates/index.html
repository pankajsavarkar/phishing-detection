<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url("/static/cs3.jpg") no-repeat center center/cover;
            font-family: 'Orbitron', sans-serif;
            color: #00ffcc;
            overflow: hidden;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: -1;
        }

        /* Center box */
        .container {
            margin-top: 120px;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 40px;
            text-shadow: 0 0 20px #00ffcc;
            animation: glow 2s infinite alternate;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        input {
            width: 350px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 15px #00ffcc;
            transform: scale(1.05);
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00ffcc, #00ccff);
            color: black;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #ff00cc, #ff0033);
            color: white;
        }

        /* Result animation */
        .result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 10px;
            right: 15px;
            color: #aaa;
            font-size: 14px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00ffcc; }
            to { text-shadow: 0 0 30px #00ffcc; }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🛡️ AI Phishing Detection System</h1>
    <p>Protecting users from malicious websites using Machine Learning</p>

    <form action="/predict" method="post">
        <input type="text" name="url" placeholder="Enter URL here..." required>
        <br>
        <button type="submit">🔍 Scan URL</button>
    </form>

    <div class="result">
        {% if prediction_text %}
            {{ prediction_text }}
        {% endif %}
    </div>

</div>

<div class="footer">
     Pankaj Savarkar
</div>

</body>
</html>

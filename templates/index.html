<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: url("/static/cs3.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #00ffcc;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0px 0px 20px #00ffcc;
        }

        h1 {
            color: #00ffcc;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            margin-top: 20px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00ccaa;
        }

        h3 {
            margin-top: 20px;
        }

        h4 {
            color: cyan;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            right: 15px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔐 Phishing Detection System</h1>

    <form action="/predict" method="POST">
        <input type="text" name="url" placeholder="Enter website URL..." required>
        <br>
        <button type="submit">Check</button>
    </form>

    <h3>{{ prediction_text }}</h3>
    <h4>{{ confidence }}</h4>
</div>

<div class="footer">
    Developed by Pankaj Savarkar
</div>

</body>
</html>

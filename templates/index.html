<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: url("/static/cs3.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #00ffcc;
            text-align: center;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .container {
            margin-top: 80px;
            background: rgba(0,0,0,0.75);
            padding: 40px;
            border-radius: 15px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0px 0px 20px #00ffcc;
            animation: fadeIn 1.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00ffcc; }
            to { text-shadow: 0 0 25px #00ffcc; }
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        button {
            padding: 12px 25px;
            margin-top: 15px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }

        table {
            margin: auto;
            width: 90%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #00ffcc;
        }

        th {
            background: #003333;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            right: 15px;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔐 Phishing Detection System</h1>

    <form action="/predict" method="POST">
        <input type="text" name="url" placeholder="Enter URL..." required>
        <br>
        <button type="submit">Check</button>
    </form>

    <h3>{{ prediction_text }}</h3>
    <h4>{{ confidence }}</h4>

    <br>
    <a href="/dashboard">
        <button>📊 View Dashboard</button>
    </a>

    <hr>

    <h2>📜 Scan History</h2>

    <table>
        <tr>
            <th>URL</th>
            <th>Result</th>
            <th>Confidence</th>
        </tr>

        {% for item in history %}
        <tr>
            <td>{{ item.url }}</td>
            <td>{{ item.result }}</td>
            <td>{{ item.confidence }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

<div class="footer">
    Developed by Pankaj Savarkar
</div>

</body>
</html>

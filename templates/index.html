<!DOCTYPE html>
<html>
<head>
    <title>AI Phishing Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Orbitron', sans-serif;
            background: black;
            color: #00ffcc;
            text-align: center;
        }

        /* MATRIX RAIN */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            margin-top: 80px;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 15px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0px 0px 25px #00ffcc;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00ffcc; }
            to { text-shadow: 0 0 25px #00ffcc; }
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        input:focus {
            box-shadow: 0 0 15px #00ffcc;
        }

        button {
            padding: 12px 25px;
            margin-top: 15px;
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ffcc;
            color: black;
            box-shadow: 0 0 15px #00ffcc;
        }

        .typing {
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #00ffcc;
            width: 0;
            animation: typing 2s steps(40, end) forwards, blink 0.7s infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        table {
            margin: auto;
            width: 90%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #00ffcc;
        }

        th {
            background: #001a1a;
        }

        tr:hover {
            background: rgba(0,255,204,0.1);
        }

        .footer {
            position: fixed;
            bottom: 10px;
            right: 15px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>⚡ AI Phishing Detection System</h1>

    <form action="/predict" method="POST">
        <input type="text" name="url" placeholder="Enter target URL..." required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    <div>
        <h3 class="typing">{{ prediction_text }}</h3>
        <h4>Confidence: {{ confidence }}</h4>
    </div>

    <br>
    <a href="/dashboard">
        <button>📊 Dashboard</button>
    </a>

    <hr>

    <h2>📜 Scan Logs</h2>

    <table>
        <tr>
            <th>URL</th>
            <th>Status</th>
            <th>Confidence</th>
        </tr>

        {% for item in history %}
        <tr>
            <td>{{ item.url }}</td>
            <td>{{ item.result }}</td>
            <td>{{ item.confidence }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

<div class="footer">
     Pankaj S
</div>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffcc";
    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
